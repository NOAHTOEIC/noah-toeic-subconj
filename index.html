<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#faf7f4">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>노아토익 부사절접속사</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf7f4;--card:#fff;--text:#2d2a26;--muted:#8a8580;--light:#b5b0ab;--rose:#e8a0b4;--blush:#f5c6d0;--lavender:#c3b1e1;--sage:#b8d4c8;--peach:#f5cba7;--sky:#a7c7e7;--warm:#f9f1ea;--coral:#f0a290;--lilac:#d4b8e0;--mint:#a8d8c8;--shadow:0 2px 16px rgba(45,42,38,.06);--shadow-lg:0 8px 32px rgba(45,42,38,.1);--radius:16px;--radius-sm:12px;--safe-bottom:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','DM Sans',sans-serif;font-weight:400}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 20px 100px;display:none;-webkit-overflow-scrolling:touch}
.screen.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.header{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:rgba(250,247,244,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700}
.header-title em{color:var(--rose);font-style:italic}
.header-sub{font-size:.62rem;color:var(--muted);letter-spacing:.08em;font-weight:500}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-around;align-items:center;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(45,42,38,.06);padding:6px 0 calc(6px + var(--safe-bottom))}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 14px;cursor:pointer;transition:all .2s;border-radius:12px;-webkit-user-select:none;user-select:none}
.tab svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:1.8;transition:all .2s}
.tab span{font-size:.6rem;color:var(--muted);font-weight:500;transition:all .2s}
.tab.active svg{stroke:var(--rose)}.tab.active span{color:var(--rose);font-weight:700}
.tab:active{transform:scale(.92)}
.hero{margin:6px 0 20px;padding:28px 22px;border-radius:20px;text-align:center;background:linear-gradient(145deg,#fdf0ea,#f3e8f4,#e8eff8);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(232,160,180,.15)}
.hero::after{content:'';position:absolute;bottom:-20px;left:-20px;width:90px;height:90px;border-radius:50%;background:rgba(195,177,225,.12)}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,4.5vw,1.8rem);font-weight:700;line-height:1.3;position:relative;z-index:1}
.hero h1 em{color:var(--rose);font-style:italic}
.hero p{color:var(--muted);font-size:.82rem;margin-top:6px;position:relative;z-index:1}
.section-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--muted);margin:20px 0 10px;padding-left:2px}
.progress-overview{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.stat-card{background:var(--card);border:1px solid rgba(45,42,38,.05);border-radius:var(--radius-sm);padding:14px 10px;text-align:center}
.stat-card .num{font-family:'DM Sans',sans-serif;font-size:1.5rem;font-weight:700}
.stat-card .label{font-size:.65rem;color:var(--muted);margin-top:2px}
.cat-list{display:flex;flex-direction:column;gap:8px}
.cat-item{background:var(--card);border:1px solid rgba(45,42,38,.05);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .25s}
.cat-item:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.cat-item:active{transform:scale(.98)}
.cat-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;font-weight:700;font-family:'DM Sans',sans-serif}
.cat-info{flex:1}.cat-info .name{font-weight:700;font-size:.86rem}.cat-info .count{font-size:.7rem;color:var(--muted);margin-top:1px}
.cat-arrow{color:var(--light);font-size:.75rem}
.cat-progress-bar{width:100%;height:3px;background:rgba(45,42,38,.06);border-radius:2px;margin-top:6px;overflow:hidden}
.cat-progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
.study-header{display:flex;align-items:center;gap:12px;padding:14px 0 10px}
.back-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid rgba(45,42,38,.06);cursor:pointer;font-size:.95rem;transition:all .2s}
.back-btn:hover{background:var(--rose);color:#fff;border-color:var(--rose)}
.study-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700}
.study-count{font-size:.7rem;color:var(--muted)}
.flashcard-container{position:relative;height:320px;margin:10px 0;perspective:1000px}
.flashcard{position:absolute;width:100%;height:100%;border-radius:20px;cursor:pointer;transition:transform .6s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.flashcard.flipped{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;width:100%;height:100%;border-radius:20px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;background:var(--card);border:1px solid rgba(45,42,38,.05);box-shadow:var(--shadow)}
.flash-back{transform:rotateY(180deg);background:linear-gradient(145deg,#fdf0ea,#f3e8f4)}
.flash-word{font-family:'DM Sans',sans-serif;font-size:clamp(1.5rem,4.5vw,2.2rem);font-weight:700;letter-spacing:-.02em;text-align:center;line-height:1.4}
.flash-meaning{font-size:1.1rem;font-weight:700;margin-bottom:4px;text-align:center}
.flash-hint{font-size:.68rem;color:var(--light);margin-top:auto;padding-top:8px}
.flash-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px}
.flash-nav-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--card);border:1.5px solid rgba(45,42,38,.08);cursor:pointer;font-size:1rem;transition:all .25s}
.flash-nav-btn:hover{background:var(--rose);color:#fff;border-color:var(--rose)}
.flash-nav-btn:active{transform:scale(.9)}
.flash-nav-btn:disabled{opacity:.25;cursor:not-allowed}
.flash-counter{font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--muted);font-weight:600;min-width:55px;text-align:center}
.flash-dots{display:flex;gap:3px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.flash-dot{width:5px;height:5px;border-radius:50%;background:rgba(45,42,38,.1);transition:all .3s}
.flash-dot.active{background:var(--rose);width:16px;border-radius:3px}
.bookmark-btn{position:absolute;top:14px;right:14px;z-index:5;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.8);border:none;cursor:pointer;font-size:.95rem;transition:all .2s}
.bookmark-btn:hover{transform:scale(1.1)}.bookmark-btn.saved{color:var(--rose)}
.type-badge{display:inline-block;padding:4px 14px;border-radius:50px;font-size:.7rem;font-weight:700;letter-spacing:.05em;margin-bottom:10px}
.type-badge.conj-badge{background:rgba(232,160,180,.12);color:var(--rose)}
.type-badge.prep-badge{background:rgba(167,199,231,.12);color:var(--sky)}
.type-badge.both-badge{background:rgba(212,184,224,.12);color:var(--lilac)}
.type-badge.adv-badge{background:rgba(184,212,200,.12);color:#6aab73}
.note-box{margin-top:12px;padding:10px 14px;background:rgba(45,42,38,.03);border-radius:10px;width:100%;text-align:center}
.note-box p{font-size:.75rem;color:var(--muted);line-height:1.6}
.quiz-progress{display:flex;gap:2px;margin:6px 0 16px}
.quiz-pip{flex:1;height:3px;border-radius:2px;background:rgba(45,42,38,.08);transition:background .3s}
.quiz-pip.done{background:var(--sage)}.quiz-pip.current{background:var(--rose)}.quiz-pip.wrong-pip{background:#d47a8a}
.quiz-card{background:var(--card);border:1px solid rgba(45,42,38,.05);border-radius:20px;padding:24px 20px;box-shadow:var(--shadow);animation:fadeIn .3s ease}
.quiz-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--lavender);margin-bottom:12px}
.quiz-sentence{font-family:'DM Sans',sans-serif;font-size:clamp(1rem,2.8vw,1.25rem);line-height:1.7;font-weight:500;margin-bottom:20px}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--warm);border:1.5px solid transparent;border-radius:var(--radius-sm);cursor:pointer;transition:all .25s;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.9rem}
.quiz-opt:hover{border-color:var(--rose);background:rgba(232,160,180,.06)}
.quiz-opt:active{transform:scale(.98)}
.opt-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;background:var(--card);border:1.5px solid rgba(45,42,38,.1);flex-shrink:0;transition:all .25s}
.quiz-opt:hover .opt-circle{border-color:var(--rose);color:var(--rose)}
.quiz-opt.correct{border-color:#6aab73;background:rgba(106,171,115,.08)}
.quiz-opt.correct .opt-circle{background:#6aab73;color:#fff;border-color:#6aab73}
.quiz-opt.wrong{border-color:#d47a8a;background:rgba(212,122,138,.06);animation:gentleShake .4s ease}
.quiz-opt.wrong .opt-circle{background:#d47a8a;color:#fff;border-color:#d47a8a}
@keyframes gentleShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.quiz-feedback{margin-top:14px;padding:12px 14px;border-radius:var(--radius-sm);font-size:.82rem;line-height:1.6;animation:fadeIn .3s ease}
.quiz-feedback.correct-fb{background:rgba(106,171,115,.08);color:#5a9463}
.quiz-feedback.wrong-fb{background:rgba(212,122,138,.06);color:#b8687a}
.quiz-next{display:block;width:100%;margin-top:14px;padding:13px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--rose),var(--lavender));color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.quiz-next:active{transform:scale(.98)}
.quiz-result-screen{text-align:center;padding:36px 20px}
.result-circle{width:130px;height:130px;border-radius:50%;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(145deg,#fdf0ea,#f3e8f4);border:3px solid var(--rose)}
.result-circle .score{font-family:'DM Sans',sans-serif;font-size:2.2rem;font-weight:700;color:var(--rose)}
.result-circle .of{font-size:.7rem;color:var(--muted)}
.result-msg{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:6px}
.result-sub{font-size:.85rem;color:var(--muted);line-height:1.6}
.result-btn{display:inline-flex;align-items:center;gap:6px;margin-top:20px;padding:11px 24px;border-radius:50px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--rose),var(--lavender));color:#fff;font-size:.85rem;font-weight:600;font-family:'Noto Sans KR',sans-serif}
.result-btn:active{transform:scale(.96)}
.result-btn.secondary{background:var(--card);color:var(--text);border:1.5px solid rgba(45,42,38,.1);box-shadow:none}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.4}
.empty-state p{font-size:.85rem;line-height:1.6}
.bookmark-list{display:flex;flex-direction:column;gap:6px}
.bm-item{background:var(--card);border:1px solid rgba(45,42,38,.05);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.bm-word{font-family:'DM Sans',sans-serif;font-weight:700;font-size:.92rem}
.bm-meaning{font-size:.72rem;color:var(--muted);margin-top:1px}
.bm-remove{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(212,122,138,.08);color:#d47a8a;border:none;cursor:pointer;font-size:.75rem}
.bm-remove:hover{background:#d47a8a;color:#fff}
.tip-banner{background:linear-gradient(135deg,rgba(195,177,225,.12),rgba(232,160,180,.1));border:1px solid rgba(195,177,225,.15);border-radius:var(--radius);padding:16px;margin:12px 0}
.tip-banner .tip-tag{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--lavender);margin-bottom:6px}
.tip-banner p{font-size:.82rem;line-height:1.7;color:var(--muted)}
.tip-banner .hl{color:var(--rose);font-weight:700}
.petal{position:fixed;top:-20px;z-index:200;pointer-events:none;border-radius:50% 0 50% 50%;animation:petalFall var(--dur) cubic-bezier(.25,.46,.45,.94) forwards}
@keyframes petalFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:.8}100%{transform:translateY(105vh) rotate(540deg) scale(.3);opacity:0}}
.quiz-type-sel{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.quiz-type-btn{background:var(--card);border:1px solid rgba(45,42,38,.05);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .25s;text-align:center}
.quiz-type-btn:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.quiz-type-btn:active{transform:scale(.98)}
.quiz-type-btn .qt-title{font-weight:700;font-size:.95rem;margin-bottom:4px}
.quiz-type-btn .qt-desc{font-size:.75rem;color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <div class="header"><div><div class="header-title">노아토익 <em>부사절접속사</em></div><div class="header-sub">ADVERB CLAUSE CONJUNCTION MASTER</div></div></div>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="hero"><h1><em>부사절접속사</em><br>완전 정복</h1><p>부사절접속사 · 전치사 · 접속부사 비교 암기</p></div>
    <div class="section-label">학습 현황</div>
    <div class="progress-overview">
      <div class="stat-card"><div class="num" id="stat-total">0</div><div class="label">전체 항목</div></div>
      <div class="stat-card"><div class="num" id="stat-bookmarked">0</div><div class="label">저장</div></div>
    </div>
    <div class="tip-banner"><div class="tip-tag">💡 핵심 포인트</div><p><span class="hl">부사절접속사</span> 뒤에는 <span class="hl">S + V (절)</span>가 와요!<br><span class="hl">전치사</span> 뒤에는 <span class="hl">명사(구)</span>가 와요!<br><span class="hl">접속부사</span>는 두 문장을 <span class="hl">내용적</span>으로 연결해요!</p></div>
    <div class="section-label">부사절접속사</div>
    <div class="cat-list" id="conj-list"></div>
    <div class="section-label" style="margin-top:20px">전치사</div>
    <div class="cat-list" id="prep-list"></div>
    <div class="section-label" style="margin-top:20px">전치사 & 부사절접속사 겸용</div>
    <div class="cat-list" id="both-list"></div>
    <div class="section-label" style="margin-top:20px">접속부사</div>
    <div class="cat-list" id="adverb-list"></div>
  </div>

  <!-- STUDY -->
  <div class="screen" id="screen-study">
    <div class="study-header"><div class="back-btn" onclick="goHome()">←</div><div><div class="study-title" id="study-cat-name"></div><div class="study-count" id="study-cat-count"></div></div></div>
    <div id="study-content"></div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="study-header"><div class="back-btn" onclick="goHome()">←</div><div><div class="study-title">퀴즈</div><div class="study-count">실력 테스트</div></div></div>
    <div id="quiz-area"></div>
  </div>

  <!-- BOOKMARKS -->
  <div class="screen" id="screen-bookmarks">
    <div style="padding:14px 0 6px"><span class="section-label" style="margin:0">저장한 항목</span></div>
    <div id="bookmark-content"></div>
  </div>

  <div class="tab-bar">
    <div class="tab active" data-tab="home" onclick="switchTab('home')"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg><span>홈</span></div>
    <div class="tab" data-tab="quiz" onclick="switchTab('quiz');showQuizMenu()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 015 0c0 1.5-2.5 2-2.5 3.5M12 17h.01"/></svg><span>퀴즈</span></div>
    <div class="tab" data-tab="bookmarks" onclick="switchTab('bookmarks');renderBookmarks()"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg><span>저장</span></div>
  </div>
</div>

<script>
// ===== 부사절접속사 DATA =====
const conjCats = [
  {id:'time',name:'시간 부사절접속사',emoji:'⏰',color:'#e8a0b4',bg:'rgba(232,160,180,.1)',
   note:'시간을 나타내는 부사절은 미래를 현재로 대신한다.',
   items:[
    {word:'after',meaning:'~후에',dualUse:true},
    {word:'before',meaning:'~전에',dualUse:true},
    {word:'until',meaning:'~할 때까지',dualUse:true},
    {word:'since',meaning:'~한 이래로',dualUse:true},
    {word:'as',meaning:'~할 때',dualUse:true},
    {word:'as soon as',meaning:'~하자마자 (= soon after)'},
    {word:'by the time',meaning:'그때까지'},
    {word:'once',meaning:'일단 ~하기만 하면'},
    {word:'while',meaning:'~하는 동안'},
    {word:'when',meaning:'~할 때'}
  ]},
  {id:'cond',name:'조건 부사절접속사',emoji:'❓',color:'#c3b1e1',bg:'rgba(195,177,225,.1)',
   note:'"만약"이라는 조건을 나타내는 부사절은 미래를 현재로 대신한다.',
   items:[
    {word:'in case (that)',meaning:'~경우에'},
    {word:'in the event (that)',meaning:'~경우에'},
    {word:'if',meaning:'만약'},
    {word:'assuming (that)',meaning:'만약'},
    {word:'provided (that)',meaning:'만약'},
    {word:'as long as',meaning:'~하기만 하면'},
    {word:'only if',meaning:'오직 ~한 경우에만'},
    {word:'unless',meaning:'만약 ~이 아니라면'}
  ]},
  {id:'conc',name:'양보 부사절접속사',emoji:'🤝',color:'#b8d4c8',bg:'rgba(184,212,200,.12)',
   note:'"~에도 불구하고"라는 의미로 상반되는 문맥을 갖는다.',
   items:[
    {word:'although',meaning:'~에도 불구하고'},
    {word:'even though',meaning:'~에도 불구하고'},
    {word:'though',meaning:'~에도 불구하고'},
    {word:'even if',meaning:'~에도 불구하고'}
  ]},
  {id:'reason',name:'이유 부사절접속사',emoji:'💡',color:'#f5cba7',bg:'rgba(245,203,167,.12)',
   note:'"~때문에"라는 의미로 인과관계를 나타낸다.',
   items:[
    {word:'because',meaning:'~때문에'},
    {word:'as',meaning:'~때문에',dualUse:true},
    {word:'since',meaning:'~때문에',dualUse:true},
    {word:'now that',meaning:'~때문에'}

function getCatData(type,idx){
  if(type==='conj')return conjCats[idx];
  if(type==='prep')return prepCatsFiltered[idx];
  if(type==='both')return bothCat;
  if(type==='adv')return advCats[idx];
  return null;
}
function getTypeLabel(type){
  if(type==='conj')return '부사절접속사';
  if(type==='prep')return '전치사';
  if(type==='both')return '전치사 & 부사절접속사 겸용';
  if(type==='adv')return '접속부사';
  return '';
}
function getBadgeClass(type){
  if(type==='conj')return 'conj-badge';
  if(type==='prep')return 'prep-badge';
  if(type==='both')return 'both-badge';
  if(type==='adv')return 'adv-badge';
  return '';
}

function goStudy(type,idx){
  const cat=getCatData(type,idx);if(!cat||cat.items.length===0)return;
  const saved=lastCardPos[type+'-'+idx]||0;
  currentStudy={type,catIdx:idx,card:Math.min(saved,cat.items.length-1)};
  document.getElementById('study-cat-name').textContent=cat.name;
  document.getElementById('study-cat-count').textContent=cat.items.length+'개 항목';
  renderStudyCard();switchTab('study');
}

function renderStudyCard(){
  const cat=getCatData(currentStudy.type,currentStudy.catIdx);
  const items=cat.items;
  const i=currentStudy.card;
  const total=items.length;
  const bkey=`${currentStudy.type}-${currentStudy.catIdx}-${i}`;
  const isSaved=bookmarks.has(bkey);
  const bmBtn=`<button class="bookmark-btn ${isSaved?'saved':''}" onclick="event.stopPropagation();toggleBM('${bkey}')">${isSaved?'♥':'♡'}</button>`;
  const it=items[i];
  // Check if this specific item is dual-use (both 접속사 & 전치사)
  const isDual=it.dualUse||currentStudy.type==='both';
  const typeLabel=isDual?'전치사 & 부사절접속사 겸용':getTypeLabel(currentStudy.type);
  const badgeClass=isDual?'both-badge':getBadgeClass(currentStudy.type);

  const cardHTML=`<div class="flashcard-container">
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="flash-front">${bmBtn}
        <div style="font-size:.6rem;color:${cat.color};font-weight:600;letter-spacing:.1em;margin-bottom:6px">${cat.emoji} ${cat.name}</div>
        <div class="flash-word">${it.word}</div>
        <div class="flash-hint">탭하면 뜻과 품사를 볼 수 있어요</div>
      </div>
      <div class="flash-back">${bmBtn}
        <div class="type-badge ${badgeClass}">${typeLabel}</div>
        <div class="flash-word" style="font-size:1.6rem;color:var(--rose)">${it.word}</div>
        <div class="flash-meaning" style="margin-top:12px;font-size:1.15rem">${it.meaning}</div>
        ${cat.note?`<div class="note-box"><p>${cat.note}</p></div>`:''}
      </div>
    </div></div>`;

  const dots=Array.from({length:total},(_,j)=>`<div class="flash-dot ${j===i?'active':''}"></div>`).join('');
  document.getElementById('study-content').innerHTML=`${cardHTML}
    <div class="flash-nav">
      <button class="flash-nav-btn" ${i===0?'disabled':''} onclick="studyPrev()">‹</button>
      <span class="flash-counter">${i+1} / ${total}</span>
      <button class="flash-nav-btn" ${i===total-1?'disabled':''} onclick="studyNext()">›</button>
    </div><div class="flash-dots">${dots}</div>`;
}

function flipCard(){const el=document.getElementById('flashcard');if(!el)return;el.classList.toggle('flipped');if(el.classList.contains('flipped')){learnedCards.add(`${currentStudy.type}-${currentStudy.catIdx}-${currentStudy.card}`);saveState()}}
function saveCardPos(){lastCardPos[currentStudy.type+'-'+currentStudy.catIdx]=currentStudy.card;saveState()}
function studyNext(){const cat=getCatData(currentStudy.type,currentStudy.catIdx);if(currentStudy.card<cat.items.length-1){currentStudy.card++;saveCardPos();renderStudyCard()}}
function studyPrev(){if(currentStudy.card>0){currentStudy.card--;saveCardPos();renderStudyCard()}}

let stx=0;
document.addEventListener('touchstart',e=>{if(document.getElementById('screen-study').classList.contains('active'))stx=e.touches[0].clientX});
document.addEventListener('touchend',e=>{if(!document.getElementById('screen-study').classList.contains('active'))return;const d=e.changedTouches[0].clientX-stx;if(Math.abs(d)>60){d<0?studyNext():studyPrev()}});

  let html='<div class="bookmark-list">';
  bookmarks.forEach(key=>{
    const p=key.split('-');const type=p[0],ci=parseInt(p[1]),ii=parseInt(p[2]);
    const cat=getCatData(type,ci);if(!cat)return;const it=cat.items[ii];if(!it)return;
    const tl=it.dualUse?'전치사 & 부사절접속사 겸용':getTypeLabel(type);
    html+=`<div class="bm-item"><div><div class="bm-word">${it.word}</div><div class="bm-meaning">${tl} · ${it.meaning}</div></div><button class="bm-remove" onclick="bookmarks.delete('${key}');saveState();renderBookmarks();document.getElementById('stat-bookmarked').textContent=bookmarks.size">✕</button></div>`;
  });
  html+='</div>';el.innerHTML=html;
}

function makeMeanQuiz(pool,label){
  const allM=[...new Set(pool.map(x=>x.meaning))];
  const picked=shuffle(pool).slice(0,Math.min(10,pool.length));
  quizState.data=picked.map(it=>{
    const wrongs=shuffle(allM.filter(m=>m!==it.meaning)).slice(0,3);
    const opts=shuffle([it.meaning,...wrongs]);
    return{q:it.word,sub:`이 ${label}의 뜻은?`,opts,ans:opts.indexOf(it.meaning),hint:`${it.word} = ${it.meaning}`};
  });
  quizState.current=0;quizState.score=0;quizState.answered=[];quizState.mode='normal';renderQuiz();
}
function startConjMeanQuiz(){makeMeanQuiz(allConj,'부사절접속사')}
function startPrepMeanQuiz(){makeMeanQuiz(allPrep,'전치사')}
function startAdvMeanQuiz(){makeMeanQuiz(allAdv,'접속부사')}

function startTypeQuiz(){
  const pool=shuffle(allItems).slice(0,10);
  const fixedOpts=['전치사','부사절접속사','전치사 & 부사절접속사 겸용','접속부사'];
  quizState.data=pool.map(it=>{
    return{q:it.word,sub:`"${it.meaning}" — 이 표현의 품사는?`,opts:fixedOpts,ans:fixedOpts.indexOf(it.typeName),hint:`${it.word}은(는) ${it.typeName}입니다`};
  });
  quizState.current=0;quizState.score=0;quizState.answered=[];quizState.mode='normal';renderQuiz();
}

function renderQuiz(){
  const{current,data}=quizState;
  if(current>=data.length){renderQuizResult();return}
  const q=data[current];
  let pips='';for(let i=0;i<data.length;i++){let c='quiz-pip';if(i<current)c+=quizState.answered[i]?' done':' wrong-pip';else if(i===current)c+=' current';pips+=`<div class="${c}"></div>`}
  document.getElementById('quiz-area').innerHTML=`
    <div class="quiz-progress">${pips}</div>
    <div class="quiz-card"><div class="quiz-label">Question ${current+1} of ${data.length}</div>
      <div class="quiz-sentence" style="font-size:1.15rem;font-weight:700">${q.q}</div>
      <div style="font-size:.85rem;color:var(--muted);margin:-14px 0 18px">${q.sub}</div>
      <div class="quiz-options">${q.opts.map((o,i)=>`<div class="quiz-opt" onclick="answerQuiz(${i})"><span class="opt-circle">${String.fromCharCode(65+i)}</span><span>${o}</span></div>`).join('')}</div>
      <div id="quiz-fb"></div></div>`;
}

function answerQuiz(idx){
  const q=quizState.data[quizState.current];
  const opts=document.querySelectorAll('.quiz-opt');
  if([...opts].some(o=>o.classList.contains('correct')))return;
  opts.forEach(o=>o.style.pointerEvents='none');
  const correct=idx===q.ans;
  if(correct){quizState.score++;quizState.answered.push(true);if(quizState.mode==='wrong-review'){const qk=JSON.stringify({q:q.q,sub:q.sub});wrongBank=wrongBank.filter(w=>JSON.stringify({q:w.q,sub:w.sub})!==qk);saveState()}}
  else{quizState.answered.push(false);if(quizState.mode!=='wrong-review'){const qk=JSON.stringify({q:q.q,sub:q.sub});if(!wrongBank.some(w=>JSON.stringify({q:w.q,sub:w.sub})===qk)){wrongBank.push({...q});saveState()}}}
  opts[idx].classList.add(correct?'correct':'wrong');
  if(!correct)opts[q.ans].classList.add('correct');
  document.getElementById('quiz-fb').innerHTML=`
    <div class="quiz-feedback ${correct?'correct-fb':'wrong-fb'}">${correct?'✓ 정답!':'✗ 아쉬워요!'} ${q.hint}</div>
    <button class="quiz-next" onclick="quizState.current++;renderQuiz()">${quizState.current<quizState.data.length-1?'다음 문제 →':'결과 보기'}</button>`;
  if(correct)spawnPetals();
  const pips=document.querySelectorAll('.quiz-pip');pips[quizState.current].classList.remove('current');pips[quizState.current].classList.add(correct?'done':'wrong-pip');
}

function startWrongQuiz(){
  if(wrongBank.length===0){document.getElementById('quiz-area').innerHTML=`<div style="text-align:center;padding:60px 20px"><div style="font-size:3rem;margin-bottom:16px;opacity:.4">🎉</div><div style="font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:8px">틀린 문제가 없어요!</div><div style="font-size:.88rem;color:var(--muted);line-height:1.6">다른 퀴즈를 풀고 틀린 문제가 생기면<br>이곳에서 복습할 수 있어요.</div><button class="result-btn" style="margin-top:24px" onclick="showQuizMenu()">← 돌아가기</button></div>`;return}
  quizState.data=shuffle([...wrongBank]);quizState.current=0;quizState.score=0;quizState.answered=[];quizState.mode='wrong-review';renderQuiz();
}

function renderQuizResult(){
  const{score,data}=quizState;const total=data.length;const pct=Math.round(score/total*100);
  let msg,sub;
  if(quizState.mode==='wrong-review'){
    if(pct===100){msg='완벽해요! 🎉';sub='틀렸던 문제를 모두 맞혔어요!'}
    else if(pct>=70){msg='잘했어요! ✨';sub=`${score}개를 맞혀서 모음집에서 제거했어요.<br>나머지 ${wrongBank.length}개가 남아있어요.`}
    else{msg='다시 도전! 💪';sub=`${score}개를 맞혀서 모음집에서 제거했어요.<br>나머지 ${wrongBank.length}개를 더 복습해봐요.`}
  } else {
    if(pct>=90){msg='완벽해요! 🎉';sub='접속사 마스터 인정!'}
    else if(pct>=70){msg='잘했어요! ✨';sub='조금만 더 하면 완벽!'}
    else if(pct>=50){msg='괜찮아요! 💪';sub='틀린 표현을 저장해서 복습해보세요'}
    else{msg='화이팅! 🌱';sub='카테고리별로 다시 학습해봐요'}
  }
  document.getElementById('quiz-area').innerHTML=`
    <div class="quiz-result-screen">
      <div class="result-circle"><div class="score">${score}</div><div class="of">/ ${total}</div></div>
      <div class="result-msg">${msg}</div><div class="result-sub">${sub}</div>
      ${wrongBank.length>0?`<button class="result-btn" onclick="startWrongQuiz()">📕 틀린문제 다시 풀기 (${wrongBank.length})</button><br>`:''}
      <button class="result-btn ${wrongBank.length>0?'secondary':''}" style="margin-top:10px" onclick="showQuizMenu()">다른 퀴즈 풀기</button><br>
      <button class="result-btn secondary" style="margin-top:10px" onclick="goHome()">홈으로</button>
    </div>`;
  if(pct>=70)spawnPetals();
}

function spawnPetals(){const colors=['#e8a0b4','#c3b1e1','#f5c6d0','#f5cba7','#b8d4c8'];for(let i=0;i<12;i++){const p=document.createElement('div');p.className='petal';p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};--dur:${2+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${6+Math.random()*7}px;height:${6+Math.random()*7}px;opacity:${.5+Math.random()*.3}`;document.body.appendChild(p);setTimeout(()=>p.remove(),4500)}}

loadState();renderHome();

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
</body>
